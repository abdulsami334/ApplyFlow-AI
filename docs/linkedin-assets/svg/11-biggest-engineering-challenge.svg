<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080">
      <stop stop-color="#070b1a"/>
      <stop offset="0.55" stop-color="#0c1230"/>
      <stop offset="1" stop-color="#111032"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1480 180) rotate(145) scale(620 420)">
      <stop stop-color="#a855f7" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(330 900) rotate(-25) scale(620 360)">
      <stop stop-color="#38bdf8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glowA)"/>
  <rect width="1920" height="1080" fill="url(#glowB)"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    
    
    <text x="110" y="92" font-size="24" font-weight="800" fill="#38bdf8" letter-spacing="4">APPLYFLOW AI CASE STUDY</text>
    <text x="110" y="158" font-size="56" font-weight="850" fill="#f8fbff">Biggest Challenge</text>
    <text x="110" y="230" font-size="42" font-weight="850" fill="#f8fbff">Migrating legacy data without losing a single record</text>
    
    <rect x="150" y="315" width="560" height="76" rx="24" fill="#151f45" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="188" cy="353" r="12" fill="#38bdf8"/>
    <text x="218" y="353" font-size="28" font-weight="750" fill="#f8fbff">Legacy File</text>
    <text x="218" y="382" font-size="20" fill="#aebce0">email|company|position|date|status|notes</text><path d="M 430 399 L 430 418" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="150" y="430" width="560" height="76" rx="24" fill="#151f45" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="188" cy="468" r="12" fill="#6366f1"/>
    <text x="218" y="468" font-size="28" font-weight="750" fill="#f8fbff">Migration Script</text>
    <text x="218" y="497" font-size="20" fill="#aebce0">PowerShell pipeline</text><path d="M 430 514 L 430 533" stroke="#6366f1" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="150" y="545" width="560" height="76" rx="24" fill="#151f45" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="188" cy="583" r="12" fill="#a855f7"/>
    <text x="218" y="583" font-size="28" font-weight="750" fill="#f8fbff">Validation</text>
    <text x="218" y="612" font-size="20" fill="#aebce0">format and required fields</text><path d="M 430 629 L 430 648" stroke="#a855f7" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="150" y="660" width="560" height="76" rx="24" fill="#151f45" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="188" cy="698" r="12" fill="#38bdf8"/>
    <text x="218" y="698" font-size="28" font-weight="750" fill="#f8fbff">Normalization</text>
    <text x="218" y="727" font-size="20" fill="#aebce0">status, dates, emails</text><path d="M 430 744 L 430 763" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="150" y="775" width="560" height="76" rx="24" fill="#151f45" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="188" cy="813" r="12" fill="#6366f1"/>
    <text x="218" y="813" font-size="28" font-weight="750" fill="#f8fbff">PostgreSQL</text>
    <text x="218" y="842" font-size="20" fill="#aebce0">Users + Applications</text>
    <rect x="880" y="360" width="750" height="330" rx="32" fill="#111936" stroke="#30406f" stroke-width="2"/>
    <text x="955" y="450" font-size="54" font-weight="900" fill="#34d399">Data Integrity Goal</text>
    <text x="955" y="530" font-size="32" fill="#aebce0">Preserve every parsed row, normalize it, and emit migrated row count.</text>
    <text x="955" y="615" font-size="28" fill="#aebce0">Grounded in scripts/migrate-legacy-applications.ps1</text>
  
    
    <text x="110" y="1010" font-size="22" fill="#aebce0">ASP.NET Core | Next.js | PostgreSQL | Playwright | Jira</text>
    <text x="1810" y="1010" text-anchor="end" font-size="24" font-weight="800" fill="#aebce0">11/14</text>
  </g>
  <title>Biggest Engineering Challenge</title>
</svg>