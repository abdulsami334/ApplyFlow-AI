<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080">
      <stop stop-color="#070b1a"/>
      <stop offset="0.55" stop-color="#0c1230"/>
      <stop offset="1" stop-color="#111032"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1480 180) rotate(145) scale(620 420)">
      <stop stop-color="#a855f7" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(330 900) rotate(-25) scale(620 360)">
      <stop stop-color="#38bdf8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glowA)"/>
  <rect width="1920" height="1080" fill="url(#glowB)"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    
    
    <text x="110" y="92" font-size="24" font-weight="800" fill="#38bdf8" letter-spacing="4">CURRENT IMPLEMENTATION</text>
    <text x="110" y="158" font-size="56" font-weight="850" fill="#f8fbff">Resume Match Workflow</text>
    
    <rect x="160" y="220" width="560" height="76" rx="24" fill="#151f45" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="198" cy="258" r="12" fill="#38bdf8"/>
    <text x="228" y="258" font-size="28" font-weight="750" fill="#f8fbff">Resume Upload</text>
    <text x="228" y="287" font-size="20" fill="#aebce0">PDF, DOC, DOCX, TXT accepted</text><path d="M 440 304 L 440 328" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="160" y="340" width="560" height="76" rx="24" fill="#151f45" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="198" cy="378" r="12" fill="#6366f1"/>
    <text x="228" y="378" font-size="28" font-weight="750" fill="#f8fbff">Text Extraction</text>
    <text x="228" y="407" font-size="20" fill="#aebce0">implemented for text/plain</text><path d="M 440 424 L 440 448" stroke="#6366f1" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="160" y="460" width="560" height="76" rx="24" fill="#151f45" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="198" cy="498" r="12" fill="#a855f7"/>
    <text x="228" y="498" font-size="28" font-weight="750" fill="#f8fbff">Keyword Extraction</text>
    <text x="228" y="527" font-size="20" fill="#aebce0">regex + stop-word filtering</text><path d="M 440 544 L 440 568" stroke="#a855f7" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="160" y="580" width="560" height="76" rx="24" fill="#151f45" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="198" cy="618" r="12" fill="#38bdf8"/>
    <text x="228" y="618" font-size="28" font-weight="750" fill="#f8fbff">Job Description</text>
    <text x="228" y="647" font-size="20" fill="#aebce0">stored per application</text><path d="M 440 664 L 440 688" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="160" y="700" width="560" height="76" rx="24" fill="#151f45" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="198" cy="738" r="12" fill="#6366f1"/>
    <text x="228" y="738" font-size="28" font-weight="750" fill="#f8fbff">Match Score</text>
    <text x="228" y="767" font-size="20" fill="#aebce0">matched / detected keywords</text><path d="M 440 784 L 440 808" stroke="#6366f1" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="160" y="820" width="560" height="76" rx="24" fill="#151f45" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="198" cy="858" r="12" fill="#a855f7"/>
    <text x="228" y="858" font-size="28" font-weight="750" fill="#f8fbff">ATS-style Match %</text>
    <text x="228" y="887" font-size="20" fill="#aebce0">deterministic scoring</text>
    <rect x="870" y="280" width="780" height="430" rx="32" fill="#111936" stroke="#30406f" stroke-width="2"/>
    <text x="940" y="365" font-size="42" font-weight="850" fill="#f8fbff">What the user sees</text>
    <text x="940" y="445" font-size="34" fill="#aebce0">Matched keywords</text>
    <text x="940" y="505" font-size="34" fill="#aebce0">Missing keywords</text>
    <text x="940" y="565" font-size="34" fill="#aebce0">Resume suggestions</text>
    <text x="940" y="625" font-size="34" fill="#aebce0">Warning when text extraction is unavailable</text>
  
    
    <text x="110" y="1010" font-size="22" fill="#aebce0">ASP.NET Core | Next.js | PostgreSQL | Playwright | Jira</text>
    <text x="1810" y="1010" text-anchor="end" font-size="24" font-weight="800" fill="#aebce0">05/14</text>
