<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080">
      <stop stop-color="#070b1a"/>
      <stop offset="0.55" stop-color="#0c1230"/>
      <stop offset="1" stop-color="#111032"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1480 180) rotate(145) scale(620 420)">
      <stop stop-color="#a855f7" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(330 900) rotate(-25) scale(620 360)">
      <stop stop-color="#38bdf8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glowA)"/>
  <rect width="1920" height="1080" fill="url(#glowB)"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    
    
    <text x="110" y="92" font-size="24" font-weight="800" fill="#38bdf8" letter-spacing="4">APPLYFLOW AI CASE STUDY</text>
    <text x="110" y="158" font-size="56" font-weight="850" fill="#f8fbff">Why Modernization Was Needed</text>
    
    <rect x="160" y="240" width="430" height="76" rx="24" fill="#151f45" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="198" cy="278" r="12" fill="#38bdf8"/>
    <text x="228" y="289" font-size="28" font-weight="750" fill="#f8fbff">Legacy C++ Console</text>
    <path d="M 375 324 L 375 343" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="160" y="355" width="430" height="76" rx="24" fill="#151f45" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="198" cy="393" r="12" fill="#6366f1"/>
    <text x="228" y="404" font-size="28" font-weight="750" fill="#f8fbff">Flat File Storage</text>
    <path d="M 375 439 L 375 458" stroke="#6366f1" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="160" y="470" width="430" height="76" rx="24" fill="#151f45" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="198" cy="508" r="12" fill="#a855f7"/>
    <text x="228" y="519" font-size="28" font-weight="750" fill="#f8fbff">Manual Tracking</text>
    <path d="M 375 554 L 375 573" stroke="#a855f7" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="160" y="585" width="430" height="76" rx="24" fill="#151f45" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="198" cy="623" r="12" fill="#38bdf8"/>
    <text x="228" y="634" font-size="28" font-weight="750" fill="#f8fbff">No Authentication</text>
    <path d="M 375 669 L 375 688" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="160" y="700" width="430" height="76" rx="24" fill="#151f45" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="198" cy="738" r="12" fill="#6366f1"/>
    <text x="228" y="749" font-size="28" font-weight="750" fill="#f8fbff">No Dashboard</text>
    <path d="M 375 784 L 375 803" stroke="#6366f1" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <rect x="160" y="815" width="430" height="76" rx="24" fill="#151f45" stroke="#a855f7" stroke-width="2.5"/>
    <circle cx="198" cy="853" r="12" fill="#a855f7"/>
    <text x="228" y="864" font-size="28" font-weight="750" fill="#f8fbff">Hard to Scale</text>
    
    <rect x="820" y="270" width="860" height="470" rx="32" fill="#111936" stroke="#30406f" stroke-width="2"/>
    <text x="890" y="350" font-size="42" font-weight="850" fill="#f8fbff">Core Problems</text>
    <text x="910" y="430" font-size="32" fill="#aebce0"><tspan fill="#fb7185" font-weight="800">-</tspan> Data lived outside a relational model</text>
<text x="910" y="498" font-size="32" fill="#aebce0"><tspan fill="#fb7185" font-weight="800">-</tspan> No user-level access control</text>
<text x="910" y="566" font-size="32" fill="#aebce0"><tspan fill="#fb7185" font-weight="800">-</tspan> No visual workflow or analytics layer</text>
<text x="910" y="634" font-size="32" fill="#aebce0"><tspan fill="#fb7185" font-weight="800">-</tspan> Hard to validate, test, and extend</text>
<text x="910" y="702" font-size="32" fill="#aebce0"><tspan fill="#fb7185" font-weight="800">-</tspan> Migration was required before AI-style features could be credible</text>
  
    
    <text x="110" y="1010" font-size="22" fill="#aebce0">ASP.NET Core | Next.js | PostgreSQL | Playwright | Jira</text>
    <text x="1810" y="1010" text-anchor="end" font-size="24" font-weight="800" fill="#aebce0">02/14</text>
  </g>
  <title>Problem Statement</title>
</svg>